<!DOCTYPE html>
<!--
  WordLens — Icon Generator
  ─────────────────────────────────────────────────────────────────────────────
  Open this file in any browser, then click each "Download" button to save the
  icon PNG files into this folder (icons/).

  After downloading all three, refresh Chrome's extension page.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate WordLens Icons</title>
<style>
  body { font-family: system-ui, sans-serif; display: flex; gap: 24px;
         padding: 24px; align-items: flex-start; }
  .icon-wrap { text-align: center; }
  canvas { display: block; border: 1px solid #eee; border-radius: 8px;
           margin-bottom: 8px; }
  button { display: block; width: 100%; padding: 6px 12px; cursor: pointer;
           background: #3b82f6; color: #fff; border: none; border-radius: 6px;
           font-size: 13px; }
  p { font-size: 12px; color: #666; margin-top: 6px; }
</style>
</head>
<body>
<script>
function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const r   = size * 0.12; // corner radius

  // Background rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#1d4ed8');
  grad.addColorStop(1, '#3b82f6');
  ctx.fillStyle = grad;
  ctx.fill();

  // Letter W
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${size * 0.55}px -apple-system, Arial`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('W', size / 2, size * 0.52);

  return canvas;
}

[16, 48, 128].forEach(size => {
  const canvas = drawIcon(size);

  const wrap = document.createElement('div');
  wrap.className = 'icon-wrap';

  const label = document.createElement('p');
  label.textContent = `${size}×${size}`;

  const btn = document.createElement('button');
  btn.textContent = `Download icon${size}.png`;
  btn.onclick = () => {
    const a = document.createElement('a');
    a.download = `icon${size}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  wrap.appendChild(canvas);
  wrap.appendChild(btn);
  wrap.appendChild(label);
  document.body.appendChild(wrap);
});
</script>
</body>
</html>
